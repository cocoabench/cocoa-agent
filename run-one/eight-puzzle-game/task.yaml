instruction: |-
  You will interact with the 8-puzzle game at the following website:
  https://8puzzle-game.vercel.app/

  **Task:**

  This is a grounding smoke test, not a puzzle-solving task.

  Your only goal is to use the web interface to click the visible `Check Code` button on the page.

  **Interaction Constraints:**
  - Do NOT use DOM-based actions such as `dom_mark_elements`, `dom_click`, `dom_type`, `dom_press`, `dom_scroll`, `dom_get_html`, `dom_get_text`, or `dom_query_selector`.
  - Use coordinate-based browser actions instead.
  - Automatic screenshots captured by the framework do NOT count. You must explicitly call `browser_screenshot()` yourself when the instructions require a screenshot.
  - Prefer this workflow:
    1. Take a screenshot with `browser_screenshot()`.
    2. Locate the `Check Code` button visually.
    3. Click it with `browser_click(x, y)`.
    4. After clicking, explicitly take another screenshot with `browser_screenshot()` so I can inspect the post-click state.
    5. Use that post-click screenshot to verify whether the click actually succeeded.
    6. If the click did not succeed, adjust and try again. Do not finish until you have verified success from an explicit post-click screenshot.

  Requirements:
  1. Navigate to the page.
  2. Identify the `Check Code` button in the UI.
  3. Click the `Check Code` button using a coordinate-based browser action.
  4. Immediately after clicking it, explicitly take one more screenshot showing the page state after the click.
  5. Check that screenshot to verify whether the click actually worked.
  6. If the click did not work, try again until you verify success from a post-click screenshot.
  7. Only after you have verified success, finish the task immediately. Do not try to solve the puzzle.

  **Output Format:**

  ```
  <answer>CLICKED</answer>
  ```

  Return exactly `<answer>CLICKED</answer>` only after you click the button, explicitly take the post-click screenshot yourself, and verify from that screenshot that the click succeeded.

